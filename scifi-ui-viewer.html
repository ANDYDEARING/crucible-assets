<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synty SciFi UI Asset Viewer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0a0a0f;
            color: #e0e0e0;
            min-height: 100vh;
        }
        .container { display: flex; min-height: 100vh; }
        .sidebar {
            width: 280px;
            background: #12121a;
            border-right: 1px solid #2a2a3a;
            padding: 20px;
            overflow-y: auto;
            position: fixed;
            height: 100vh;
        }
        .sidebar h1 {
            font-size: 1.2rem;
            color: #00d4ff;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .sidebar h2 { font-size: 0.8rem; color: #666; margin-bottom: 20px; }
        .search-box {
            width: 100%;
            padding: 10px 15px;
            background: #1a1a25;
            border: 1px solid #2a2a3a;
            border-radius: 6px;
            color: #fff;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .search-box:focus { outline: none; border-color: #00d4ff; }
        .folder-list { list-style: none; }
        .folder-item { margin-bottom: 5px; }
        .folder-btn {
            width: 100%;
            padding: 10px 12px;
            background: transparent;
            border: none;
            color: #b0b0b0;
            text-align: left;
            cursor: pointer;
            border-radius: 6px;
            font-size: 13px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .folder-btn:hover { background: #1a1a25; color: #fff; }
        .folder-btn.active { background: #00d4ff20; color: #00d4ff; }
        .folder-btn .icon { font-size: 16px; }
        .subfolder { margin-left: 20px; margin-top: 5px; display: none; }
        .folder-item.open > .subfolder { display: block; }
        .main { flex: 1; margin-left: 280px; padding: 30px; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #2a2a3a;
            flex-wrap: wrap;
            gap: 15px;
        }
        .header h2 { color: #00d4ff; font-weight: 400; }
        .view-controls { display: flex; gap: 15px; align-items: center; }
        .size-slider { width: 120px; accent-color: #00d4ff; }
        .image-count { color: #666; font-size: 14px; }
        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(var(--thumb-size, 120px), 1fr));
            gap: 15px;
        }
        .image-card {
            background: #15151f;
            border-radius: 8px;
            padding: 10px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }
        .image-card:hover {
            background: #1a1a28;
            border-color: #00d4ff40;
            transform: translateY(-2px);
        }
        .image-card img {
            width: 100%;
            height: var(--thumb-size, 120px);
            object-fit: contain;
            border-radius: 4px;
        }
        .image-card .name {
            font-size: 10px;
            color: #888;
            margin-top: 8px;
            text-align: center;
            word-break: break-all;
            line-height: 1.3;
            max-height: 3.9em;
            overflow: hidden;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 40px;
        }
        .modal.active { display: flex; }
        .modal img { max-width: 90%; max-height: 70vh; object-fit: contain; }
        .modal .info { margin-top: 20px; text-align: center; }
        .modal .filename { color: #00d4ff; font-size: 16px; margin-bottom: 5px; }
        .modal .filepath { color: #666; font-size: 12px; font-family: monospace; }
        .modal .close-btn {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 30px;
            color: #666;
            cursor: pointer;
            background: none;
            border: none;
        }
        .modal .close-btn:hover { color: #fff; }
        .loading { color: #666; text-align: center; padding: 50px; }
        .checker-bg {
            background-image:
                linear-gradient(45deg, #1a1a1a 25%, transparent 25%),
                linear-gradient(-45deg, #1a1a1a 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #1a1a1a 75%),
                linear-gradient(-45deg, transparent 75%, #1a1a1a 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            background-color: #111;
        }
        .toggle-icon { margin-right: 4px; font-size: 10px; transition: transform 0.2s; display: inline-block; }
        .folder-item.open > button .toggle-icon { transform: rotate(90deg); }
    </style>
</head>
<body>
    <div class="container">
        <nav class="sidebar">
            <h1>SciFi UI</h1>
            <h2>Synty Asset Pack</h2>
            <input type="text" class="search-box" placeholder="Search assets..." id="search">
            <ul class="folder-list" id="folderList"></ul>
        </nav>
        <main class="main">
            <div class="header">
                <h2 id="currentFolder">All Assets</h2>
                <div class="view-controls">
                    <span class="image-count" id="imageCount">0 images</span>
                    <label style="color:#666;font-size:12px">Size:</label>
                    <input type="range" class="size-slider" id="sizeSlider" min="60" max="200" value="120">
                </div>
            </div>
            <div class="image-grid" id="imageGrid">
                <div class="loading">Loading assets...</div>
            </div>
        </main>
    </div>
    <div class="modal" id="modal">
        <button class="close-btn" id="closeBtn">&times;</button>
        <img id="modalImg" class="checker-bg">
        <div class="info">
            <div class="filename" id="modalFilename"></div>
            <div class="filepath" id="modalFilepath"></div>
        </div>
    </div>

        };

        let currentPath = '';

        function init() {
            renderFolderList();
            renderImages(allImages);
            setupEventListeners();
        }

        function setupEventListeners() {
            document.getElementById('search').addEventListener('input', function() {
                const filtered = currentPath ? allImages.filter(img => img.startsWith(basePath + currentPath)) : allImages;
                renderImages(filtered);
            });

            document.getElementById('sizeSlider').addEventListener('input', function(e) {
                document.documentElement.style.setProperty('--thumb-size', e.target.value + 'px');
            });

            document.getElementById('modal').addEventListener('click', function(e) {
                if (e.target.id === 'modal') closeModal();
            });

            document.getElementById('closeBtn').addEventListener('click', closeModal);

            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') closeModal();
            });
        }

        function renderFolderList() {
            const list = document.getElementById('folderList');
            let html = '<li class="folder-item"><button class="folder-btn active" data-path=""><span class="icon">📁</span> All Assets (' + allImages.length + ')</button></li>';
            html += renderFolderTree(folders, '');
            list.innerHTML = html;

            list.querySelectorAll('.folder-btn').forEach(function(btn) {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const path = this.getAttribute('data-path');
                    const li = this.closest('.folder-item');
                    if (li.querySelector('.subfolder')) {
                        li.classList.toggle('open');
                    }
                    selectFolder(path, this);
                });
            });
        }

        function renderFolderTree(obj, path) {
            let html = '';
            for (const name in obj) {
                const children = obj[name];
                const fullPath = path ? path + '/' + name : name;
                const hasChildren = Object.keys(children).length > 0;
                const count = allImages.filter(img => img.startsWith(basePath + fullPath + '/') || img.startsWith(basePath + fullPath)).length;
                html += '<li class="folder-item">' +
                    '<button class="folder-btn" data-path="' + fullPath + '">' +
                    (hasChildren ? '<span class="toggle-icon">▶</span>' : '') +
                    '<span class="icon">' + (hasChildren ? '📂' : '📁') + '</span> ' + name + ' (' + count + ')</button>';
                if (hasChildren) {
                    html += '<ul class="folder-list subfolder">' + renderFolderTree(children, fullPath) + '</ul>';
                }
                html += '</li>';
            }
            return html;
        }

        function selectFolder(path, btn) {
            currentPath = path;
            document.querySelectorAll('.folder-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const filtered = path ? allImages.filter(img => img.startsWith(basePath + path + '/') || img === basePath + path) : allImages;
            document.getElementById('currentFolder').textContent = path || 'All Assets';
            renderImages(filtered);
        }

        function renderImages(images) {
            const grid = document.getElementById('imageGrid');
            const search = document.getElementById('search').value.toLowerCase();
            const filtered = search ? images.filter(img => img.toLowerCase().includes(search)) : images;
            document.getElementById('imageCount').textContent = filtered.length + ' images';

            if (filtered.length === 0) {
                grid.innerHTML = '<div class="loading">No images found</div>';
                return;
            }

            let htmlStr = '';
            for (let i = 0; i < filtered.length; i++) {
                const img = filtered[i];
                const name = img.split('/').pop().replace('.png', '');
                htmlStr += '<div class="image-card" data-path="' + img + '"><img src="' + img + '" loading="lazy" class="checker-bg"><div class="name">' + name + '</div></div>';
            }
            grid.innerHTML = htmlStr;

            grid.querySelectorAll('.image-card').forEach(function(card) {
                card.addEventListener('click', function() {
                    openModal(this.getAttribute('data-path'));
                });
                card.querySelector('img').addEventListener('error', function() {
                    this.parentElement.style.display = 'none';
                });
            });
        }

        function openModal(path) {
            document.getElementById('modalImg').src = path;
            document.getElementById('modalFilename').textContent = path.split('/').pop();
            document.getElementById('modalFilepath').textContent = path;
            document.getElementById('modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        init();
    </script>
</body>
</html>
